<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f0f0f0">
<title>DEBUG — WEIIMG</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0f0f0; font-family: -apple-system, monospace; }

  /* These three bars MUST be visible at the very top if my CSS is correct */
  .bar-red    { position: fixed; top: 0;       left: 0; right: 0; height: env(safe-area-inset-top); background: red;    z-index: 10000; }
  .bar-blue   { position: fixed; top: 100px;   left: 0; right: 0; height: 4px;  background: blue;   z-index: 10000; }
  .bar-green  { position: fixed; top: 200px;   left: 0; right: 0; height: 4px;  background: green;  z-index: 10000; }

  /* Fake nav identical to inner-page nav */
  nav.nav {
    position: sticky; top: 0;
    height: 56px;
    display: flex; align-items: center;
    padding: 0 20px;
    background: #f0f0f0;
    border-bottom: 1px solid #DCDCD9;
    z-index: 101;
  }
  nav.nav strong { font-size: 14px; letter-spacing: .15em; }

  main { padding: 24px 20px; }
  h1   { font-size: 18px; margin: 16px 0 8px; }
  pre  { font-size: 12px; line-height: 1.5; background: #fff; padding: 12px; border-radius: 6px; overflow: auto; }

  /* Tall content so user can scroll and screenshot scrolling state */
  .filler { height: 300px; background: orange; margin: 16px 0; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #fff; font-weight: bold; }
</style>
</head>
<body>
  <nav class="nav"><strong>WEIIMG*</strong></nav>

  <div class="bar-red"></div>
  <div class="bar-blue"></div>
  <div class="bar-green"></div>

  <main>
    <h1>iOS Debug</h1>
    <pre id="info">loading…</pre>

    <h1>Scroll Test</h1>
    <p>The RED bar at the very top should have height = env(safe-area-inset-top).<br>
       The BLUE bar at y=100 marks viewport position 100px.<br>
       The GREEN bar at y=200 marks viewport position 200px.</p>

    <div class="filler">ORANGE 1</div>
    <div class="filler">ORANGE 2</div>
    <div class="filler">ORANGE 3</div>
    <div class="filler">ORANGE 4</div>
  </main>

<script>
  function dump() {
    const cs = getComputedStyle(document.documentElement);
    const safeTop = cs.getPropertyValue('--safe-top') || 'n/a';
    // Read env() value via computed property
    const probe = document.createElement('div');
    probe.style.cssText = 'position:fixed;top:0;height:env(safe-area-inset-top);visibility:hidden;';
    document.body.appendChild(probe);
    const envTop = getComputedStyle(probe).height;
    probe.remove();

    const nav = document.querySelector('nav.nav');
    const navRect = nav.getBoundingClientRect();
    const red = document.querySelector('.bar-red').getBoundingClientRect();

    document.getElementById('info').textContent =
      'UA: ' + navigator.userAgent +
      '\n\nviewport: ' + window.innerWidth + ' x ' + window.innerHeight +
      '\nscreen:   ' + screen.width + ' x ' + screen.height +
      '\nDPR:      ' + window.devicePixelRatio +
      '\n\nenv(safe-area-inset-top) = ' + envTop +
      '\nbar-red rect: top=' + red.top + ' bottom=' + red.bottom + ' height=' + red.height +
      '\nnav rect:     top=' + navRect.top + ' bottom=' + navRect.bottom + ' height=' + navRect.height +
      '\nnav position: ' + getComputedStyle(nav).position +
      '\nnav bg:       ' + getComputedStyle(nav).backgroundColor +
      '\nscrollY:      ' + window.scrollY;
  }
  dump();
  window.addEventListener('scroll', dump);
</script>
</body>
</html>
